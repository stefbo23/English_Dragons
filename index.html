<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tiger Toms 3 - English Quest</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<header>

<h1>🐯 Tiger Toms 3</h1>

<div id="playerBar">

<div>
Level
<span id="level">1</span>
</div>

<div>
XP
<span id="xp">0</span>
</div>

<div>
⭐
<span id="stars">0</span>
</div>

</div>

</header>

<main id="screen">

<section id="home">

<h2>English Quest</h2>

<p>

Willkommen kleiner Held!

Lerne Englisch

besiege Monster

und sammle Sterne.

</p>

<button id="btnStart">
▶ Abenteuer starten
</button>

<button id="btnWords">
📚 Wörter lernen
</button>

<button id="btnMemory">
🎮 Memory
</button>

</section>

<section id="world" class="hidden">

<h2>Weltkarte</h2>

<div class="worldMap">

<div class="node active">

🏠

<p>Dorf</p>

</div>

<div class="road"></div>

<div class="node">

🌳

<p>Wald</p>

</div>

<div class="road"></div>

<div class="node">

🏴‍☠️

<p>Piraten</p>

</div>

<div class="road"></div>

<div class="node">

🏖️

<p>Strand</p>

</div>

</div>

<button id="btnBack">

⬅ Zurück

</button>

</section>

<section id="vocabulary" class="hidden">

<h2>Vokabeln</h2>

<div id="wordList"></div>

<button id="btnBack2">

⬅ Zurück

</button>

</section>

<section id="memory" class="hidden">

<h2>Memory</h2>

<div id="memoryBoard"></div>

<button id="btnBack3">

⬅ Zurück

</button>

</section>

</main>

</div>

<script src="vocabulary.js"></script>
<script src="memory.js"></script>
<script src="app.js"></script>

</body>

</html>
