<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tiger Toms 3 — Kai & Ryu Wort-Abenteuer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>

<div id="app">
  <div class="top-bar">
    <div class="top-bar__title">🐉 <span>Tiger Toms 3</span></div>
    <div class="badge" id="points-display">0 ⚡</div>
  </div>

  <main>
    <section id="screen-home" class="screen"></section>
    <section id="screen-comic" class="screen"></section>
    <section id="screen-games" class="screen"></section>
    <section id="screen-vocab" class="screen"></section>
    <section id="screen-rewards" class="screen"></section>
  </main>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" data-screen="home"><span class="nav-btn__icon">🏠</span>Start</button>
  <button class="nav-btn" data-screen="comic"><span class="nav-btn__icon">📖</span>Comic</button>
  <button class="nav-btn" data-screen="games"><span class="nav-btn__icon">🎮</span>Spiele</button>
  <button class="nav-btn" data-screen="vocab"><span class="nav-btn__icon">📚</span>Vokabeln</button>
  <button class="nav-btn" data-screen="rewards"><span class="nav-btn__icon">🏆</span>Belohnung</button>
</nav>

<!-- Module: strikte Ladereihenfolge (Daten → Komponenten → Features → App) -->
<script src="js/data/vocabulary.js"></script>
<script src="js/components/components.js"></script>
<script src="js/speech/speech.js"></script>
<script src="js/rewards/rewards.js"></script>
<script src="js/comics/comics.js"></script>
<script src="js/games/games.js"></script>
<script src="js/app.js"></script>
</body>
</html>
